name: NSE Harmonic Scanner

on:
  schedule:
    - cron: '30 11 * * 1-5'   # 5:00 PM IST Mon–Fri
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_CREDS_JSON:  ${{ secrets.GOOGLE_CREDS_JSON }}
      EMAIL_FROM:         ${{ secrets.EMAIL_FROM }}
      EMAIL_TO:           ${{ secrets.EMAIL_TO }}
      EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_SMTP_HOST:    smtp.gmail.com
      EMAIL_SMTP_PORT:    "587"
      MAX_WORKERS:        "4"
      ZIGZAG_DEPTH:       "12"
      LOOKBACK_DAYS:      "365"
      FIB_TOLERANCE:      "0.05"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify jugaad-data install
        run: python -c "from jugaad_data.nse import stock_df; print('jugaad-data OK')"

      - name: Run scanner
        run: python harmonic_scanner.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-${{ github.run_id }}
          path: |
            results_*.json
            scanner.log
          retention-days: 30
